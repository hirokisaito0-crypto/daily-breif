<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日次ブリーフ ― 仕組みと工夫したポイント</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, "Segoe UI", sans-serif;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 1.5rem;
      letter-spacing: 0.02em;
    }
    .card {
      background: #fff;
      border-radius: 1.25rem;
      box-shadow: 0 4px 24px 0 rgba(0,0,0,0.10);
      padding: 1.5rem;
      max-width: 1100px;
      width: 100%;
    }
    .card img {
      width: 100%;
      height: auto;
      border-radius: 0.75rem;
      display: block;
    }
    footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <h1>日次ブリーフ ― 仕組みと工夫したポイント</h1>
  <div class="card">
    <img src="./daily-brief-diagram.png" alt="日次ブリーフ 工夫したポイントと仕組みの図解" />
  </div>
  <footer>Daily Brief ／ UK・欧州 日系金融機関向け 金融監督ニュース自動収集ツール</footer>
</body>
</html>
